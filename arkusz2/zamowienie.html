<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabryka żelków</title>
    <link rel="stylesheet" href="styl9.css">
</head>
<body>
    <section class="gora_1">
        <a href="index.html">
            <img src="logo.png" alt="logo fabryki">
        </a>
    </section>
    <section class="gora_2">
        <a href="zamowienie.html" class="zam_1" target="_blank">Zamówienie</a>
    </section>
    <section class="baner">
        <h2>Zamów nasz produkt</h2>
    </section>
    <section class="glowny_1">   
        <h1>Oferta</h1>
        <table>
            <tr>
                <td>Kształty</td>
                <td>Kolory</td>
            </tr>
            <tr>
                <td>
                    <ol>
                        <li>miś</li>
                        <li>żabka</li>
                        <li>serce</li>
                    </ol>
                </td>
                <td>
                    <ol>
                        <li>czerwony</li>
                        <li>niebieski</li>
                        <li>żółty</li>
                        <li>inny</li>
                    </ol>
                </td>
            </tr>
        </table> 
    </section>
    <section class="glowny_2">
        <p>Podaj numer kształtu:</p>
        <form>
            <input type="number" id="numer_ksz"> <br>
            Skomponuj swój kolor, podaj RGB <br> 
            R: <input type="number" id="r"> 
            G: <input type="number" id="g"> 
            B: <input type="number" id="b"> 
            <input type="button" onclick="zamow()" value="Zamów"> 
        </form>
        <p id="tekst">Wybrany kształt:</p>
        <button id="kolor">Wybrany kolor</button>
        <script src="main.js"></script>
    </section>
    <footer> 
        Autor strony: <i>Golf mkVII GTI</i> 
    </footer> 
</body>
</html>
