<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        first name: <input type="text" name="first_n" placeholder="Podaj imie" required > <br>
        last name: <input type="text" name="last_n" placeholder="Podaj nazwisko" required > <br>
        password <input type="password" name="password" placeholder="podaj haslo" required > <br>
        email <input type="email" name="email" placeholder="podaj email" required > <br>
        phone # <input type="phone" name="phone" placeholder="podaj nr telefonu" required > <br>
        birthdate <input type="date" name="birthdate" placeholder="podaj date" required > <br>
        quantity <input type="number" name="quantity" placeholder="podaj numer"> <br>
        title: Mr<input type="radio" id="Mr" name="Mr" value="Mr">
              Mrs<input type="radio" id="Mrs" name="Mrs" value="Mrs">  
              Phd<input type="radio" id="phd" name="phd" value="phd"> <br>
            Payment <select name="Payment" id="Payment">
                        <option value="visa" >Visa</option>
                        <option value="mastercard">mastercard</option>
                        <option value="giftcard">giftcard</option>
                    </select> <br>
                    <input type="reset" value="Reset"> <br>
                    <input type="submit" value="Submit"> <br>
                   subscribe: <input type="checkbox" name="subscribe">
    </form>
</body>
</html>
