<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="parent">
        <h3>Formularz wyboru języka</h3>
        <select name="jezyki" id="jezyki">
            <optgroup label="Jezyki slowianskie">
                <option value="polski">polski</option>
                <option value="rosyjski">rosyjski</option>
                <option value="ukraiński">ukraiński</option>
            </optgroup>
            <optgroup label="Języki romańskie">
                <option value="francuski">francuski</option>
                <option value="włoski">włoski</option>
            </optgroup>
        </select>
    </form>
</body>
</html>
