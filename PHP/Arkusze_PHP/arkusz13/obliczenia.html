<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacja paliw</title>
    <link rel="stylesheet" href="styl2.css">
    <script >
        function egzamin() {
           // var wybor = document.getElementById("paliwo").value;
           var paliwo_1 = document.getElementById("paliwo").value; 
           var litry_1 = document.getElementById("litry").value;
           
            if(paliwo_1== "1")
            {
                var koszt = 4 ; 
                document.write("Cena za paliwo wynosi: ",(koszt * litry_1)," zł");
            }                       
            else if (paliwo_1 == 2 )
            {
                var koszt_2 = 3.5;
                document.write("Cena za paliwo wynosi: ",(koszt_2 * litry_1)," zł");
            }
            else{
                document.write("Cena za paliwo wynosi: 0 zł");
            }
            return false;
   }
    </script>
</head>
<body>
    <section class="baner">
        <h1>Całodobowa stacja paliw</h1>
    </section>
    <section class="menu">
        <a href="stacja.html" target="_blank">
        <img src="home.png">
         </a>  
         <a href="obliczenia.html" target="_blank">
         <img src="znak.png">
        </a>
        <a href="kwerendy.txt" download>Pobierz dokumenty</a>
    </section>
    <section class="lewy">
        <h2>Orientacyjny koszt paliwa</h2>
        <form name="dzialaj_pls" action ="javascript:egzamin()" >
            Rodzaj paliwa (1-benzyna,2-olej napędowy)<br> <input type="number" name="paliwo" id="paliwo">
          <br>  Ile litrów <br> <input type="number" name="litry" id="litry">
           <br> <input type="submit" value="Oblicz">
        </form>
    </section>
    <section class="prawy">
        <img id="auto" src="samochod.png" alt="samochod">
    </section>
    <section class="stopka">
        <p>Stronę opracował: golf VII GTI</p>
        <a href="https://www.volkswagen.pl/pl/modele/golf-gti.html" target="_blank" title="Kup golfa">
            <img src="GTI.jpg" width="300px"> <!-- wiem że to psuje layout strony ;) -->
        </a>
    </section>
</body>
</html>
